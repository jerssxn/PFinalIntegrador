; ─────────────────────────────────────────────────────────────────────────
; VitalGuard IoT — ESP32-S3 + MAX30102 con MQTT (EMQX) y OTA desde S3
;
; Las credenciales NO van escritas en el código. Se inyectan al compilar
; desde el archivo .env mediante el script scripts/build_with_env.py.
;
; Forma recomendada de compilar/subir:
;     python scripts/build_with_env.py run            (compilar)
;     python scripts/build_with_env.py run -t upload  (compilar + subir)
;     python scripts/build_with_env.py run -t monitor (monitor serie)
; ─────────────────────────────────────────────────────────────────────────
[platformio]
default_envs = esp32-s3-devkitc-1

[env:esp32-s3-devkitc-1]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
upload_speed = 921600

; Esquema de particiones con DOS slots de app (necesario para OTA).
; min_spiffs deja ~1.9MB por slot, suficiente para este firmware.
board_build.partitions = min_spiffs.csv

lib_deps =
    adafruit/Adafruit SSD1306 @ ^2.5.7
    adafruit/Adafruit GFX Library @ ^1.11.9
    sparkfun/SparkFun MAX3010x Pulse and Proximity Sensor Library @ ^1.1.2
    links2004/WebSockets @ ^2.4.1
    knolleary/PubSubClient @ ^2.8
    bblanchon/ArduinoJson @ ^6.21.3

; Las variables se leen del entorno (cargadas desde .env por el script).
; platformio.ini las inyecta como #define usando ${sysenv.VARIABLE}.
build_flags =
    -D ARDUINO_USB_MODE=1
    -D ARDUINO_USB_CDC_ON_BOOT=1
    -D MQTT_MAX_PACKET_SIZE=1024
    -D COUNTRY=\"${sysenv.COUNTRY}\"
    -D STATE=\"${sysenv.STATE}\"
    -D CITY=\"${sysenv.CITY}\"
    -D INSTITUTION=\"${sysenv.INSTITUTION}\"
    -D MQTT_SERVER=\"${sysenv.MQTT_SERVER}\"
    -D MQTT_PORT=${sysenv.MQTT_PORT}
    -D MQTT_USER=\"${sysenv.MQTT_USER}\"
    -D MQTT_PASSWORD=\"${sysenv.MQTT_PASSWORD}\"
    -D MQTT_TLS=${sysenv.MQTT_TLS}
    -D WIFI_SSID=\"${sysenv.WIFI_SSID}\"
    -D WIFI_PASSWORD=\"${sysenv.WIFI_PASSWORD}\"
