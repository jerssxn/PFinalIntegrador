; ─────────────────────────────────────────────────────────────────────────
; VitalGuard IoT — ESP32-S3 + MAX30102 con MQTT (EMQX) y OTA desde S3
;
; Las credenciales NO van escritas en el código. Se inyectan al compilar
; desde el archivo .env mediante scripts/inject_env.py (extra_scripts).
;
; Como inject_env.py lee el .env directamente, puedes compilar de dos formas:
;   1) Con el botón de PlatformIO en VS Code (Build / Upload / Monitor).
;   2) Por terminal:
;        pio run                 (compilar)
;        pio run -t upload       (compilar + subir)
;        pio run -t monitor      (monitor serie)
;   (El script scripts/build_with_env.py sigue funcionando, pero ya es opcional.)
; ─────────────────────────────────────────────────────────────────────────
[platformio]
default_envs = esp32-s3-devkitc-1

[env:esp32-s3-devkitc-1]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
upload_speed = 921600

; Esquema de particiones con DOS slots de app (necesario para OTA).
; min_spiffs deja ~1.9MB por slot, suficiente para este firmware.
board_build.partitions = min_spiffs.csv

lib_deps =
    adafruit/Adafruit SSD1306 @ ^2.5.7
    adafruit/Adafruit GFX Library @ ^1.11.9
    sparkfun/SparkFun MAX3010x Pulse and Proximity Sensor Library @ ^1.1.2
    links2004/WebSockets @ ^2.4.1
    knolleary/PubSubClient @ ^2.8
    bblanchon/ArduinoJson @ ^6.21.3

; Las credenciales (COUNTRY, MQTT_*, WIFI_*) se inyectan como #define desde el
; archivo .env mediante scripts/inject_env.py (ver extra_scripts abajo). Ese
; método usa StringifyMacro, así que soporta espacios y símbolos en el SSID o
; las contraseñas (p. ej. "Starlink 5g") sin romper la compilación.
build_flags =
    -D ARDUINO_USB_MODE=1
    -D ARDUINO_USB_CDC_ON_BOOT=1
    -D MQTT_MAX_PACKET_SIZE=1024

; Inyecta las credenciales del .env antes de compilar.
extra_scripts = pre:scripts/inject_env.py
