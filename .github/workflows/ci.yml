name: VitalGuard IoT CI + OTA

# - En cada push/PR: compila el firmware (verifica que no haya errores).
# - Al crear un tag vX.Y.Z: compila, sube el .bin a S3 y publica por MQTT
#   el comando OTA en el tópico .../sensor/in para que el ESP32 se actualice.

on:
  push:
    branches: [ main ]
    tags: [ 'v*.*.*' ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Compilar firmware
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar PlatformIO
        run: |
          python -m pip install --upgrade pip
          pip install platformio

      - name: Determinar versión del firmware
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "FW_VERSION=${GITHUB_REF#refs/tags/}" >> "$GITHUB_ENV"
          else
            echo "FW_VERSION=dev-$(date -u +%Y%m%d-%H%M)" >> "$GITHUB_ENV"
          fi

      - name: Compilar
        run: pio run
        env:
          COUNTRY:       ${{ secrets.COUNTRY }}
          STATE:         ${{ secrets.STATE }}
          CITY:          ${{ secrets.CITY }}
          INSTITUTION:   ${{ secrets.INSTITUTION }}
          MQTT_SERVER:   ${{ secrets.MQTT_SERVER }}
          MQTT_PORT:     ${{ secrets.MQTT_PORT }}
          MQTT_USER:     ${{ secrets.MQTT_USER }}
          MQTT_PASSWORD: ${{ secrets.MQTT_PASSWORD }}
          MQTT_TLS:      ${{ secrets.MQTT_TLS }}
          WIFI_SSID:     ${{ secrets.WIFI_SSID }}
          WIFI_PASSWORD: ${{ secrets.WIFI_PASSWORD }}

      - name: Renombrar binario
        run: |
          mkdir -p dist
          cp .pio/build/esp32-s3-devkitc-1/firmware.bin "dist/firmware_${FW_VERSION}.bin"

      - name: Guardar binario como artefacto
        uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: dist/

  deploy-ota:
    name: Subir a S3 y publicar OTA
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - name: Determinar versión
        run: echo "FW_VERSION=${GITHUB_REF#refs/tags/}" >> "$GITHUB_ENV"

      - name: Descargar artefacto
        uses: actions/download-artifact@v4
        with:
          name: firmware
          path: dist/

      - name: Subir firmware a S3
        run: |
          aws s3 cp "dist/firmware_${FW_VERSION}.bin" \
            "s3://${{ secrets.S3_BUCKET }}/firmware_${FW_VERSION}.bin" \
            --content-type application/octet-stream
        env:
          AWS_ACCESS_KEY_ID:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION:    ${{ secrets.AWS_REGION }}

      - name: Publicar comando OTA por MQTT
        run: |
          pip install paho-mqtt boto3
          python3 - <<'PY'
          import os, json, ssl
          import boto3
          from botocore.client import Config
          import paho.mqtt.publish as publish

          version = os.environ["FW_VERSION"]
          key = f"firmware_{version}.bin"
          bucket = os.environ["S3_BUCKET"]

          # URL prefirmada (válida 7 días). No requiere que el bucket sea público.
          s3 = boto3.client("s3", region_name=os.environ["AWS_REGION"],
                            config=Config(s3={"addressing_style": "path"}))
          url = s3.generate_presigned_url(
              "get_object", Params={"Bucket": bucket, "Key": key}, ExpiresIn=604800)
          payload = json.dumps({"cmd": "ota", "version": version, "url": url})

          # El backend publica en el canal de comandos del sensor (.../sensor/in)
          topic = "{c}/{s}/{ci}/{inst}/sensor/in".format(
              c=os.environ["COUNTRY"], s=os.environ["STATE"],
              ci=os.environ["CITY"], inst=os.environ["INSTITUTION"])

          tls = {} if os.environ.get("MQTT_TLS", "0") == "1" else None

          publish.single(
              topic, payload=payload,
              hostname=os.environ["MQTT_SERVER"],
              port=int(os.environ["MQTT_PORT"]),
              auth={"username": os.environ["BACKEND_MQTT_USER"],
                    "password": os.environ["BACKEND_MQTT_PASSWORD"]},
              tls=tls,
          )
          print(f"OTA publicado en {topic}: {payload}")
          PY
        env:
          COUNTRY:               ${{ secrets.COUNTRY }}
          STATE:                 ${{ secrets.STATE }}
          CITY:                  ${{ secrets.CITY }}
          INSTITUTION:           ${{ secrets.INSTITUTION }}
          MQTT_SERVER:           ${{ secrets.MQTT_SERVER }}
          MQTT_PORT:             ${{ secrets.MQTT_PORT }}
          MQTT_TLS:              ${{ secrets.MQTT_TLS }}
          BACKEND_MQTT_USER:     ${{ secrets.BACKEND_MQTT_USER }}
          BACKEND_MQTT_PASSWORD: ${{ secrets.BACKEND_MQTT_PASSWORD }}
          S3_BUCKET:             ${{ secrets.S3_BUCKET }}
          AWS_REGION:            ${{ secrets.AWS_REGION }}
          AWS_ACCESS_KEY_ID:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
